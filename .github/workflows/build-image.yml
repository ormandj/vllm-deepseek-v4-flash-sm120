name: Build and publish image

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile
        required: true
        type: choice
        default: mtp
        options:
          - control
          - deepgemm
          - mtp
          - dspark

permissions:
  contents: read
  packages: write

concurrency:
  group: sm120-vllm-image
  cancel-in-progress: false

jobs:
  build:
    # This build uses only an ephemeral GitHub-hosted VM. It is intentionally
    # not eligible for any self-hosted runner.
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Verify exact native wheel is available
        run: bash scripts/verify-native-wheel.sh
      - name: Reclaim runner disk space
        run: |
          # The CUDA toolchain and final runtime image are large. These SDKs are
          # unrelated to the build and the VM is discarded after this job.
          sudo rm -rf \
            /opt/hostedtoolcache \
            /opt/ghc \
            /opt/az \
            /usr/local/.ghcup \
            /usr/local/lib/android \
            /usr/local/share/boost \
            /usr/local/share/chromium \
            /usr/local/share/powershell \
            /usr/local/share/vcpkg \
            /usr/share/swift \
            /usr/share/dotnet
          docker system prune --all --force

          # GitHub currently assigns this label two layouts: one has roughly
          # 111 GiB free on /, while another has only about 42 GiB on / plus a
          # larger ephemeral /mnt filesystem. The latter cannot hold vLLM's
          # transient CUDA/PyTorch build layers. Put Docker on whichever
          # filesystem has more free space before creating the BuildKit
          # builder; no runner state needs to survive this ephemeral job.
          root_avail=$(df --output=avail -k / | tail -1)
          mnt_avail=$(df --output=avail -k /mnt | tail -1)
          if (( mnt_avail > root_avail )); then
            sudo systemctl stop docker.service docker.socket
            sudo install -d -m 0711 /mnt/docker
            if [[ -f /etc/docker/daemon.json ]]; then
              jq '. + {"data-root":"/mnt/docker"}' \
                /etc/docker/daemon.json \
                | sudo tee /etc/docker/daemon.json.new >/dev/null
            else
              printf '%s\n' '{"data-root":"/mnt/docker"}' \
                | sudo tee /etc/docker/daemon.json.new >/dev/null
            fi
            sudo mv /etc/docker/daemon.json.new /etc/docker/daemon.json
            sudo systemctl start docker.socket docker.service
          fi
          docker info --format 'Docker root: {{.DockerRootDir}}'
          df -h / /mnt
      - name: Log in to GHCR
        run: |
          for attempt in 1 2 3; do
            if printf '%s' '${{ secrets.GITHUB_TOKEN }}' \
              | docker login ghcr.io \
                  --username '${{ github.actor }}' \
                  --password-stdin; then
              break
            fi
            if (( attempt == 3 )); then
              echo "GHCR login failed after ${attempt} attempts" >&2
              exit 1
            fi
            sleep 10
          done
      - name: Configure serialized BuildKit
        run: |
          docker buildx create \
            --name sm120-builder \
            --driver docker-container \
            --buildkitd-config .github/buildkitd.toml \
            --use \
            --bootstrap
          docker buildx inspect sm120-builder
      - name: Build and push canonical tag
        env:
          PROFILE: ${{ inputs.profile }}
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY}:${PROFILE}"
          if [[ "$PROFILE" == deepgemm ]]; then
            CONTAINER_ENGINE=docker \
            BUILDX_BUILDER=sm120-builder \
            BUILDX_PUSH=1 \
              ./scripts/build-deepgemm.sh "$image"
          else
            CONTAINER_ENGINE=docker \
            BUILDX_BUILDER=sm120-builder \
            BUILDX_PUSH=1 \
            MAX_JOBS=4 \
            NVCC_THREADS=1 \
              ./scripts/build.sh "$PROFILE" "$image"
          fi

          raw_manifest=$(mktemp)
          docker buildx imagetools inspect --raw "$image" > "$raw_manifest"
          if jq -e 'has("manifests")' "$raw_manifest" >/dev/null; then
            echo "$image is an OCI index; expected a directly pullable image manifest" >&2
            exit 1
          fi
          jq -e '.config.digest and (.layers | length > 0)' "$raw_manifest" >/dev/null

      - name: Delete superseded package versions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          package=${GITHUB_REPOSITORY#*/}
          owner=${GITHUB_REPOSITORY_OWNER}
          gh api --paginate \
            --jq '.[] | select((.metadata.container.tags | map(. == "control" or . == "deepgemm" or . == "mtp" or . == "dspark") | any) | not) | .id' \
            "/users/${owner}/packages/container/${package}/versions?per_page=100" \
            | while read -r id; do
              gh api --method DELETE \
                "/users/${owner}/packages/container/${package}/versions/${id}"
            done

      - name: Verify one direct version per canonical tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          package=${GITHUB_REPOSITORY#*/}
          owner=${GITHUB_REPOSITORY_OWNER}
          versions=$(mktemp)
          gh api \
            "/users/${owner}/packages/container/${package}/versions?per_page=100" \
            > "$versions"
          version_count=$(jq 'length' "$versions")
          tags=$(jq -r '.[].metadata.container.tags[]' "$versions" | sort -u)
          tag_count=$(printf '%s\n' "$tags" | sed '/^$/d' | wc -l | tr -d ' ')
          test "$version_count" -eq "$tag_count"
          jq -e 'all(.[]; (.metadata.container.tags | length) == 1)' \
            "$versions" >/dev/null
          if printf '%s\n' "$tags" | grep -Evq '^(control|deepgemm|mtp|dspark)$'; then
            echo "unexpected package tag remains" >&2
            exit 1
          fi
