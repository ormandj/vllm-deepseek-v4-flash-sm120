name: Build and publish image

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile
        required: true
        type: choice
        default: agentic-mtp0
        options:
          - control
          - agentic-mtp0
          - dspark-preview

permissions:
  contents: read
  packages: write

concurrency:
  group: sm120-vllm-image
  cancel-in-progress: false

jobs:
  build:
    # This build uses only an ephemeral GitHub-hosted VM. It is intentionally
    # not eligible for any self-hosted runner.
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Reclaim runner disk space
        run: |
          # The CUDA toolchain and final runtime image are large. These SDKs are
          # unrelated to the build and the VM is discarded after this job.
          sudo rm -rf \
            /opt/hostedtoolcache \
            /opt/ghc \
            /usr/local/lib/android \
            /usr/share/dotnet
          docker system prune --all --force
          df -h /
      - name: Log in to GHCR
        run: |
          printf '%s' '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io --username '${{ github.actor }}' --password-stdin
      - name: Configure serialized BuildKit
        run: |
          docker buildx create \
            --name sm120-builder \
            --driver docker-container \
            --buildkitd-config .github/buildkitd.toml \
            --use \
            --bootstrap
          docker buildx inspect sm120-builder
      - name: Build and push immutable and moving tags
        env:
          PROFILE: ${{ inputs.profile }}
        run: |
          short_vllm=$(python3 -c 'import json; print(json.load(open("stack.lock.json"))["vllm"]["base_commit"][:10])')
          unique="ghcr.io/${GITHUB_REPOSITORY}:build-${GITHUB_RUN_ID}-${PROFILE}"
          immutable="ghcr.io/${GITHUB_REPOSITORY}:$(date +%Y%m%d)-${short_vllm}-${PROFILE}"
          moving="ghcr.io/${GITHUB_REPOSITORY}:${PROFILE}"
          CONTAINER_ENGINE=docker \
          BUILDX_BUILDER=sm120-builder \
          BUILDX_PUSH=1 \
          MAX_JOBS=4 \
          NVCC_THREADS=1 \
          BUILD_PIPELINE="github-${GITHUB_RUN_ID}" \
          BUILD_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            ./scripts/build.sh "$PROFILE" "$unique" "$immutable" "$moving"

          digest=$(docker buildx imagetools inspect "$unique" | awk '$1 == "Digest:" { print $2; exit }')
          test -n "$digest"
          {
            echo "### Published image"
            echo
            echo "\`$unique@$digest\`"
            echo
            echo "Moving tag: \`$moving\`"
          } >> "$GITHUB_STEP_SUMMARY"
