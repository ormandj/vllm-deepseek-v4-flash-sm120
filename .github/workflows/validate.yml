name: Validate integration sources

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Validate metadata and shell
        run: |
          python3 -m json.tool stack.lock.json >/dev/null
          python3 scripts/verify-lock.py
          bash -n scripts/*.sh examples/*.sh
      - name: Verify every profile applies
        run: ./scripts/verify-patches.sh
